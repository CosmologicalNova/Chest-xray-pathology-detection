# ============================================================
# Central config file — change hyperparameters here, not in code
# This is best practice: one source of truth for all settings
# ============================================================

data:
  csv_path: "data/Data_Entry_2017.csv"
  images_dir: "data/images"
  image_size: 224                  # ViT and DenseNet both expect 224x224
  batch_size: 32                   # Lower to 16 if you get CUDA out of memory
  num_workers: 4                   # Parallel data loading workers
  data_fraction: 0.1             # Start at 0.25 (25% of data) for fast iteration
                                   # Scale to 1.0 once models are tuned and working
  train_split: 0.70
  val_split:   0.15                # Validation set for hyperparameter tuning
  test_split:  0.15                # Final held-out test set, touch only at the end

labels:
  # All 14 NIH pathology classes — model outputs one probability per class
  classes:
    - "Atelectasis"
    - "Cardiomegaly"
    - "Effusion"
    - "Infiltration"
    - "Mass"
    - "Nodule"
    - "Pneumonia"
    - "Pneumothorax"
    - "Consolidation"
    - "Edema"
    - "Emphysema"
    - "Fibrosis"
    - "Pleural_Thickening"
    - "Hernia"
  num_classes: 14

training:
  epochs: 2                       # Start with 30, increase if val loss is still dropping
  learning_rate: 0.0001            # 1e-4 is standard starting point for transfer learning
                                   # Lower to 1e-5 if val loss is unstable
  weight_decay: 0.0001             # L2 regularization — increase if overfitting
  early_stopping_patience: 7      # Stop if val AUC doesn't improve for 7 epochs
  scheduler: "cosine"              # cosine annealing LR schedule — smoothly decays LR

custom_cnn:
  learning_rate: 0.001
  dropout_rate: 0.5                # Dropout between FC layers — increase if overfitting
  mc_dropout_passes: 50            # Number of forward passes for uncertainty estimation

densenet:
  learning_rate: 0.0001
  freeze_epochs: 5                 # Freeze pretrained layers for first N epochs
                                   # Then unfreeze for full fine-tuning
                                   # Increase if model diverges early in training
  dropout_rate: 0.5
  mc_dropout_passes: 50

vit:
  learning_rate: 0.0001
  model_name: "vit_base_patch16_224"  # Patch size 16 = 14x14 grid of patches per image
                                       # Try "vit_small_patch16_224" if memory is tight
  dropout_rate: 0.1                    # ViT uses lower dropout than CNNs typically
  mc_dropout_passes: 50

ensemble:
  weights: [0.2, 0.4, 0.4]        # Weighted soft voting: [custom_cnn, densenet, vit]
                                   # DenseNet and ViT get higher weight since they're stronger
                                   # Change to [0.33, 0.33, 0.33] for equal weighting

paths:
  checkpoints: "checkpoints/"      # Saved model weights go here
  logs: "logs/"                    # Training logs
  results: "results/"              # Evaluation outputs, charts, confusion matrices
